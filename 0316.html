<html>
    <head>
        <title>0316-CSS大小與顏色</title>
        <!--html 註解-->
        <style>
            /*CSS註解 */
            /*CSS基礎語法
            選擇器 Selector {
              property: value;
              屬性:設定值;
              屬性:設定值;                                                                        
            }
            選擇器三種寫法: html_tag / #id / .class
            
            */
            /*
               display:block; 設定為區塊元素，預設是 頁寬內容高，可設定寬高;自己成行，不與其他元素同一行
               display:inline; 設定為行內元素，預設是 內容寬高，不可自定寬高；可與其它元素同一行。
               display:inline-block; 設定為行內區塊元素，可自定寬高，也可與其它元素同一行。                                                            
            */
            div{
                width:200px;
                height:200px;
                display: inline-block;/*div的預設值 block*/
                background: green;
            }
            span {
               width:200px; 
               height:200px;
               display: inline-block;/*span的預設值 inline*/
               background: pink;
            }                                                            
            #d1 {
                background: blue !important;
                background: black;
            }
            /*同一個屬性，後寫的設定會覆蓋先寫的設定，與寫在class的順序無關，
            除非有 !important 改變重要性
            優先序: !important > #id > html_tag
            */
            .c1 {
                background: rgb(75, 192, 153) !important;

            }
            .c2 {
                background: #FF00FF;
            }
            /* CSS顏色表示法:
                1.常見英文單字
                2. #RRGGBB #000000~#FFFFFF 色碼:(標準寫法)
                3. rgb(r,g,b) 0~255 (三原色光的強度)
                4. hsl(h彩度0%~100%, s彩度0%~100%, L亮度0%~100%)
                5. rgba(r,g,b,a 0~1可見度)
                6. hsla(h,s,l,a 0~1可見度)
            */

        </style>
    </head>
    <body>
        <!--div:區塊容器 block-->
        <div id="d1" class="c1"></div>
        <div id="d2" class="c1 c2"></div>
        
        <!--span:行內容器 inline-->
        <span id="s1" class="c2"></span>
        <span id="s2" class="c2 c1"></span>

    </body>
</html>
