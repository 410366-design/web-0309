<html>
    <head>
        <title>0420-JavaScript輸出與輸入</title>
        <script>
            //Js單行註解
            /*Js多行
            註解*/
            function sayhello(){
                name=prompt("你叫甚麼名字?")
                console.log(name);
                document.getElementById("msg").innerHTML="Hello "+name;            
            }
            function calc(){
                userAns=parseInt(prompt("你認為答案是多少?"));

                n1=parseInt(document.getElementById("n1").value);
                n2=parseInt(document.getElementById("n2").value);
                if(isNaN(n1)) n1=0;
                n2=isNaN(n2)? 0:n2;
                document.getElementById("ans").value="答案是"+(n1+n2);
            }
            function change(){
                document.getElementById("rgn").innerHTML=document.getElementById("rg").value;
            }
        /* window 函式
            alert("訊息");
            答案=prompt("問答");
                 答案為 string 或 null
            是否=confirm("確認")
                是否為 true/false

            console.log("開發人員訊息")
        */     
        </script>
    </head>
    <body>
        <button onclick="sayhello();">打招呼</button>
        <div id="msg"></div>
        <hr>
        <input type="text" id="in1"><br>
        <input type="password"><br>
        <input type="number"><br>
        <input type="date"><br>
        <input type="daterime-local"><br>
        <input type="color"><br>
        <imput type="range" id="rg" value="0" min="0" max="10" oninput="change();"> <span id="rgn">0</span>
        <hr>
        <input type="number" id="n1">+<input type="number" id="n2">=<button onclick="calc();">?</button><br>
        <input type="text" id="ans" disabled>
    </body>
</html>
