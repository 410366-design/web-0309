<html>
    <!-- 註解 -->
	<head><!-- 網頁設定 -->
        <title>網頁標題</title>


    </head>

    <body><!-- 網頁內容 -->
		<h1>標題一</h1>
		<h2>標題二</h2>
		<h3>標題三</h3>
		<h4>標題四</h4>
		<h5>標題五</h5>
		<h6>標題六</h6><hr/>
		
		<p>段落文字<br/>段落文字段落文字段落文字段落文字</p>
		<!--格式標籤-->
		<b>粗體</b>
		<i>斜體</i>
		<u>底線</u>
		<S>刪除</S>
		<i><b>粗斜體</b></i>
		<sup>上標</sup>
		<sub>下標</sub>
		<!--語意標籤-->
		<strong>重要</strong>
		<em>強調</em>
		<ins>新增</ins>
		<del>刪除</del>
		<mark>標記</mark>
		<p>
		不間斷空白:|&nbsp;|&nbsp;|&nbsp;|&nbsp;<br>
		半形空白:|&ensp;|&ensp;|<br>
		全形空白:|&emsp;|&emsp;|<hr>
		</p>
		<pre>預格式化   文字</pre>
		<hr>
		<ul type="none"></ul>
		   <li>國文</li>
		   <li>英文</li>
		   <li>自然</li>
		   <li>社會</li>
		</ul>
	<!--區塊元素block:自己成行h1~h6,p,hr-->
	<!--行內元素inline-->	
    </body>
</html>
